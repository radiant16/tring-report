<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>T ring 天王町 — 管理画面</title>
<style>
:root {
  --bg:     #8a8680;
  --bg2:    #6e6a65;
  --card:   #ffffff;
  --border: #dddad5;
  --ink:    #2a2825;
  --muted:  #888078;
  --gold:   #9a7e5a;
  --gold-l: #b89a70;
  --sage:   #4e8a68;
  --rose:   #a04848;
  --radius: 12px;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'Meiryo','メイリオ','Hiragino Kaku Gothic ProN',sans-serif;
  background:var(--bg); color:var(--ink);
  min-height:100vh; padding-bottom:40px;
  -webkit-font-smoothing:antialiased;
}

/* ── Header ── */
.header {
  background:var(--bg2); padding:48px 16px 14px;
  border-bottom:1px solid rgba(0,0,0,.15);
  position:sticky; top:0; z-index:20;
  display:flex; justify-content:space-between; align-items:flex-end;
}
.header-left {}
.header-logo {
  font-size:16px; font-weight:500; color:#fff; letter-spacing:.04em;
}
.header-sub { font-size:9px; color:rgba(255,255,255,.5); letter-spacing:.14em; text-transform:uppercase; margin-top:2px; }
.back-btn {
  font-size:11px; color:rgba(255,255,255,.7);
  text-decoration:none; border:1px solid rgba(255,255,255,.3);
  padding:6px 14px; border-radius:20px; white-space:nowrap;
}

/* ── Date bar ── */
.date-bar {
  background:var(--bg2); padding:10px 16px;
  display:flex; align-items:center; gap:10px;
  border-bottom:1px solid rgba(0,0,0,.1);
  position:sticky; top:80px; z-index:19;
}
.date-label { font-size:11px; color:rgba(255,255,255,.6); }
.date-select {
  background:rgba(255,255,255,.12); color:#fff;
  border:1px solid rgba(255,255,255,.25); border-radius:8px;
  padding:5px 10px; font-size:13px; font-weight:500;
  -webkit-appearance:none; appearance:none;
  cursor:pointer;
}
.date-today-btn {
  margin-left:auto;
  font-size:11px; color:var(--gold-l);
  background:transparent; border:1px solid rgba(184,154,112,.4);
  padding:5px 12px; border-radius:16px; cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}

/* ── Month tab ── */
.month-tabs {
  display:flex; gap:6px; padding:12px 16px;
  background:var(--bg2); border-bottom:1px solid rgba(0,0,0,.1);
}
.month-tab {
  flex:1; padding:7px 0; text-align:center;
  font-size:12px; font-weight:500; color:rgba(255,255,255,.5);
  border:1px solid transparent; border-radius:10px;
  cursor:pointer; -webkit-tap-highlight-color:transparent; transition:all .2s;
}
.month-tab.active {
  background:rgba(255,255,255,.12); border-color:var(--gold-l); color:var(--gold-l);
}

/* ── Cards ── */
.section { padding:14px 14px 4px; }
.section-title {
  font-size:10px; letter-spacing:.14em; text-transform:uppercase;
  color:rgba(255,255,255,.6); margin-bottom:10px;
  display:flex; align-items:center; gap:8px;
}
.section-title::after { content:''; flex:1; height:1px; background:rgba(255,255,255,.1); }

/* ── Staff card ── */
.staff-card {
  background:var(--card); border-radius:var(--radius);
  margin-bottom:10px; overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
}
.staff-head {
  display:flex; align-items:center; gap:12px;
  padding:14px 16px 12px;
  border-bottom:1px solid var(--border);
  cursor:pointer; -webkit-tap-highlight-color:transparent;
}
.staff-avatar {
  width:38px; height:38px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:500; flex-shrink:0;
  border:1px solid var(--border);
}
.staff-info { flex:1; min-width:0; }
.staff-name { font-size:14px; font-weight:500; }
.staff-role { font-size:10px; color:var(--muted); margin-top:1px; }
.staff-total {
  text-align:right; flex-shrink:0;
}
.staff-total-sales { font-size:14px; font-weight:600; color:var(--gold); }
.staff-total-pct {
  font-size:10px; color:var(--muted); margin-top:2px;
}
.staff-toggle { font-size:13px; color:var(--muted); transition:transform .2s; flex-shrink:0; }
.staff-card.open .staff-toggle { transform:rotate(180deg); }

.staff-body { display:none; padding:14px 16px; }
.staff-card.open .staff-body { display:block; }

/* ── Menu input table ── */
.menu-table { width:100%; border-collapse:collapse; }
.menu-table th {
  font-size:10px; color:var(--muted); font-weight:400;
  padding:0 4px 8px; text-align:right; letter-spacing:.06em;
}
.menu-table th:first-child { text-align:left; }
.menu-table td { padding:5px 4px; vertical-align:middle; }
.menu-table td:first-child {
  font-size:12px; color:var(--ink2,#3a3630);
  display:flex; align-items:center; gap:6px; padding:5px 4px;
  white-space:nowrap;
}
.menu-dot { width:8px; height:8px; border-radius:2px; flex-shrink:0; }

/* ── Number input ── */
.num-input {
  width:100%; padding:8px 10px;
  border:1px solid var(--border); border-radius:8px;
  font-size:14px; font-family:inherit; color:var(--ink);
  background:#faf9f7; text-align:right;
  -webkit-appearance:none; appearance:none;
  transition:border-color .2s;
}
.num-input:focus { outline:none; border-color:var(--gold); background:#fff; }

/* ── Auto ratio badge ── */
.ratio-cell {
  text-align:right; font-size:13px; font-weight:600; min-width:44px;
}
.ratio-bar-wrap { padding:2px 4px 6px; }
.ratio-bar-track { height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
.ratio-bar-fill { height:100%; border-radius:2px; transition:width .4s ease; }

/* ── Staff summary row ── */
.staff-summary {
  display:flex; gap:12px; padding:10px 0 0;
  border-top:1px solid var(--border); margin-top:8px;
  flex-wrap:wrap;
}
.sum-chip {
  font-size:11px; color:var(--muted);
}
.sum-chip span { font-weight:600; color:var(--ink); }

/* ── Overall summary card ── */
.summary-card {
  background:var(--card); border-radius:var(--radius);
  padding:16px; margin-bottom:10px;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
}
.summary-title { font-size:11px; color:var(--muted); margin-bottom:12px; letter-spacing:.06em; }
.summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.sum-item {}
.sum-label { font-size:10px; color:var(--muted); margin-bottom:2px; }
.sum-value { font-size:18px; font-weight:600; color:var(--ink); }
.sum-sub { font-size:10px; color:var(--muted); margin-top:1px; }

/* ── Menu overall table ── */
.menu-summary-row {
  display:flex; align-items:center; gap:8px;
  margin-bottom:8px;
}
.menu-summary-row:last-child { margin-bottom:0; }
.msrow-name { font-size:11px; color:var(--muted); width:72px; flex-shrink:0; display:flex; align-items:center; gap:5px; }
.msrow-bar { flex:1; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.msrow-fill { height:100%; border-radius:3px; transition:width .4s; }
.msrow-val { font-size:11px; font-weight:600; min-width:38px; text-align:right; }
.msrow-cnt { font-size:10px; color:var(--muted); min-width:34px; text-align:right; }

/* ── Save button ── */
.save-area {
  padding:14px 14px 0;
}
.save-btn {
  width:100%; padding:14px;
  background:var(--gold); color:#fff;
  font-size:14px; font-weight:500; font-family:inherit;
  border:none; border-radius:12px; cursor:pointer;
  letter-spacing:.04em; transition:background .15s, transform .1s;
  -webkit-tap-highlight-color:transparent;
}
.save-btn:active { background:#7a6040; transform:scale(.98); }

.saved-badge {
  display:inline-flex; align-items:center; gap:6px;
  font-size:11px; color:var(--sage); margin-left:10px;
  opacity:0; transition:opacity .3s;
}
.saved-badge.show { opacity:1; }

/* ── Toast ── */
.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:#2a2825; color:#fff; font-size:13px;
  padding:10px 22px; border-radius:20px;
  opacity:0; transition:opacity .3s; pointer-events:none; z-index:99; white-space:nowrap;
}
.toast.show { opacity:1; }

/* ── Progress bar top ── */
.month-progress {
  background:var(--card); border-radius:var(--radius);
  padding:14px 16px; margin-bottom:10px;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
}
.mp-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
.mp-label { font-size:11px; color:var(--muted); }
.mp-value { font-size:13px; font-weight:600; color:var(--gold); }
.mp-track { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.mp-fill { height:100%; background:var(--gold); border-radius:3px; transition:width .5s; }
.mp-days { display:flex; justify-content:space-between; margin-top:6px; font-size:10px; color:var(--muted); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo">T ring 天王町</div>
    <div class="header-sub">Daily Input</div>
  </div>
  <a href="index.html" class="back-btn">← 閲覧画面</a>
</div>

<!-- Month tabs -->
<div class="month-tabs" id="monthTabs"></div>

<!-- Date bar -->
<div class="date-bar">
  <div class="date-label">日付</div>
  <select class="date-select" id="dateSelect" onchange="onDateChange()"></select>
  <button class="date-today-btn" onclick="goToday()">今日</button>
</div>

<!-- Content -->
<div id="mainContent"></div>

<div class="toast" id="toast"></div>

<script>
// ══ 定数 ══
const STAFF_DEF = [
  {id:'yamashita', name:'山下 大貴', role:'Top Stylist', ini:'山下', bg:'rgba(184,154,112,.15)', tc:'#b89a70'},
  {id:'araki',     name:'新木 彩加',  role:'Top Stylist', ini:'新木', bg:'rgba(122,170,138,.15)', tc:'#7aaa8a'},
  {id:'tomioka',   name:'富岡 輝',   role:'Top Stylist', ini:'富岡', bg:'rgba(122,174,201,.15)', tc:'#7aaec9'},
  {id:'hatanaka',  name:'畑中 守',   role:'Manager',     ini:'畑中', bg:'rgba(160,142,201,.15)', tc:'#a08ec9'},
  {id:'migihashi', name:'右橋 陸',   role:'Manager',     ini:'右橋', bg:'rgba(212,135,122,.15)', tc:'#d4877a'},
  {id:'fujita',    name:'藤田 龍法', role:'Owner',       ini:'藤田', bg:'rgba(200,184,160,.15)', tc:'#b09a70'},
];

const MENUS = [
  {key:'cut',   label:'カット',      color:'#4a6e8a'},
  {key:'color', label:'カラー',      color:'#9a7e5a'},
  {key:'perm',  label:'縮毛矯正',    color:'#a04848'},
  {key:'tr',    label:'トリートメント', color:'#4e8a68'},
  {key:'spa',   label:'ヘッドスパ',  color:'#6a607a'},
];

const MONTHS = [
  {key:'2025-01', label:'1月', days:31},
  {key:'2025-02', label:'2月', days:28},
  {key:'2025-03', label:'3月', days:31},
];

// ══ 状態 ══
let currentMonth = '2025-03';
let currentDay   = today();

function today() {
  const d = new Date();
  return d.getDate();
}

// ══ ストレージキー ══
// 日次データ: tring_day_{month}_{day}_{staffId} → {cut:{cnt,sales}, color:{cnt,sales}, ...}
function dayKey(month, day, staffId) {
  return `tring_day_${month}_${String(day).padStart(2,'0')}_${staffId}`;
}

function getStaffDay(month, day, staffId) {
  const raw = localStorage.getItem(dayKey(month, day, staffId));
  if (raw) return JSON.parse(raw);
  return Object.fromEntries(MENUS.map(m => [m.key, {cnt:0, sales:0}]));
}

function setStaffDay(month, day, staffId, data) {
  localStorage.setItem(dayKey(month, day, staffId), JSON.stringify(data));
}

// 月累積（day=1〜指定日まで合計）
function getMonthCumulative(month, upToDay) {
  const result = {};
  STAFF_DEF.forEach(s => {
    result[s.id] = Object.fromEntries(MENUS.map(m => [m.key, {cnt:0, sales:0}]));
  });
  for (let d = 1; d <= upToDay; d++) {
    STAFF_DEF.forEach(s => {
      const day = getStaffDay(month, d, s.id);
      MENUS.forEach(m => {
        result[s.id][m.key].cnt   += day[m.key].cnt;
        result[s.id][m.key].sales += day[m.key].sales;
      });
    });
  }
  return result;
}

// ══ 月タブ ══
function buildMonthTabs() {
  document.getElementById('monthTabs').innerHTML = MONTHS.map(m => `
    <div class="month-tab ${m.key===currentMonth?'active':''}"
         onclick="switchMonth('${m.key}')">${m.label}</div>
  `).join('');
}

function switchMonth(key) {
  currentMonth = key;
  buildMonthTabs();
  buildDateSelect();
  buildContent();
}

// ══ 日付セレクト ══
function buildDateSelect() {
  const mo = MONTHS.find(m => m.key === currentMonth);
  const sel = document.getElementById('dateSelect');
  sel.innerHTML = Array.from({length: mo.days}, (_,i) => {
    const d = i + 1;
    return `<option value="${d}" ${d===currentDay?'selected':''}>${d}日</option>`;
  }).join('');
}

function onDateChange() {
  currentDay = parseInt(document.getElementById('dateSelect').value);
  buildContent();
}

function goToday() {
  currentDay = today();
  buildDateSelect();
  buildContent();
}

// ══ フォーマット ══
function fmtYen(n) { return n ? n.toLocaleString('ja-JP') + '円' : '—'; }
function fmtNum(n) { return n ? n.toLocaleString() : '0'; }

// ══ メインコンテンツ ══
function buildContent() {
  const cumulative = getMonthCumulative(currentMonth, currentDay);
  const todayData  = {};
  STAFF_DEF.forEach(s => {
    todayData[s.id] = getStaffDay(currentMonth, currentDay, s.id);
  });

  // 全体集計
  let totalSales = 0, totalCnt = 0;
  const menuTotals = Object.fromEntries(MENUS.map(m => [m.key, {cnt:0, sales:0}]));
  STAFF_DEF.forEach(s => {
    MENUS.forEach(m => {
      const v = cumulative[s.id][m.key];
      totalSales += v.sales;
      totalCnt   += v.cnt;
      menuTotals[m.key].cnt   += v.cnt;
      menuTotals[m.key].sales += v.sales;
    });
  });

  const mo = MONTHS.find(m => m.key === currentMonth);
  const progressPct = Math.round(currentDay / mo.days * 100);

  let html = `
  <div class="section">
    <!-- 月次進捗 -->
    <div class="month-progress">
      <div class="mp-header">
        <div class="mp-label">${mo.label} 月次進捗（〜${currentDay}日）</div>
        <div class="mp-value">${fmtYen(totalSales)}</div>
      </div>
      <div class="mp-track"><div class="mp-fill" style="width:${progressPct}%"></div></div>
      <div class="mp-days"><span>1日</span><span>${currentDay}日（${progressPct}%経過）</span><span>${mo.days}日</span></div>
    </div>

    <!-- メニュー別合計 -->
    <div class="summary-card">
      <div class="summary-title">メニュー別累計（1日〜${currentDay}日）</div>
      ${MENUS.map(m => {
        const pct = totalSales ? Math.round(menuTotals[m.key].sales / totalSales * 100) : 0;
        return `
        <div class="menu-summary-row">
          <div class="msrow-name"><span class="menu-dot" style="background:${m.color}"></span>${m.label}</div>
          <div class="msrow-bar"><div class="msrow-fill" style="width:${pct}%;background:${m.color}"></div></div>
          <div class="msrow-val" style="color:${m.color}">${pct}%</div>
          <div class="msrow-cnt">${fmtNum(menuTotals[m.key].cnt)}件</div>
        </div>`;
      }).join('')}
      <div style="padding-top:10px;border-top:1px solid var(--border);margin-top:8px;display:flex;justify-content:space-between;font-size:11px;color:var(--muted);">
        <span>合計 ${fmtNum(totalCnt)}件</span>
        <span style="font-weight:600;color:var(--ink)">${fmtYen(totalSales)}</span>
      </div>
    </div>

    <div class="section-title">${currentDay}日 入力 — スタッフ別</div>
  `;

  // スタッフカード
  STAFF_DEF.forEach(s => {
    const d = todayData[s.id];
    const staffDaySales = MENUS.reduce((a, m) => a + d[m.key].sales, 0);
    const staffDayCnt   = MENUS.reduce((a, m) => a + d[m.key].cnt, 0);
    const staffMonthSales = MENUS.reduce((a, m) => a + cumulative[s.id][m.key].sales, 0);

    html += `
    <div class="staff-card" id="card_${s.id}">
      <div class="staff-head" onclick="toggleCard('${s.id}')">
        <div class="staff-avatar" style="background:${s.bg};color:${s.tc}">${s.ini}</div>
        <div class="staff-info">
          <div class="staff-name">${s.name}</div>
          <div class="staff-role">${s.role}</div>
        </div>
        <div class="staff-total">
          <div class="staff-total-sales">${staffDaySales ? fmtYen(staffDaySales) : '未入力'}</div>
          <div class="staff-total-pct">月計 ${fmtYen(staffMonthSales)}</div>
        </div>
        <div class="staff-toggle">▾</div>
      </div>
      <div class="staff-body" id="body_${s.id}">
        <table class="menu-table">
          <thead>
            <tr>
              <th style="width:36%">メニュー</th>
              <th style="width:22%">件数</th>
              <th style="width:26%">売上（円）</th>
              <th style="width:16%">構成比</th>
            </tr>
          </thead>
          <tbody id="tbody_${s.id}">
          </tbody>
        </table>
        <div style="padding-top:8px;border-top:1px solid var(--border);margin-top:6px;display:flex;justify-content:space-between;align-items:center;">
          <div class="staff-summary" id="sum_${s.id}"></div>
          <button onclick="saveStaff('${s.id}')" style="padding:8px 18px;background:var(--gold);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;flex-shrink:0;">保存</button>
        </div>
      </div>
    </div>`;
  });

  html += `</div>`; // .section

  document.getElementById('mainContent').innerHTML = html;

  // テーブル中身を描画
  STAFF_DEF.forEach(s => {
    renderStaffTable(s.id, todayData[s.id], cumulative[s.id]);
  });
}

function renderStaffTable(staffId, dayData, monthData) {
  const totalDaySales = MENUS.reduce((a,m) => a + (dayData[m.key].sales || 0), 0);

  const tbody = document.getElementById('tbody_' + staffId);
  if (!tbody) return;

  tbody.innerHTML = MENUS.map(m => {
    const cnt   = dayData[m.key].cnt   || 0;
    const sales = dayData[m.key].sales || 0;
    const pct   = totalDaySales ? Math.round(sales / totalDaySales * 100) : 0;
    return `
    <tr>
      <td>
        <span class="menu-dot" style="background:${m.color}"></span>
        <span style="font-size:12px">${m.label}</span>
      </td>
      <td>
        <input class="num-input" type="number" min="0"
          id="inp_${staffId}_${m.key}_cnt"
          value="${cnt || ''}" placeholder="0"
          inputmode="numeric"
          onfocus="clearZero(this)"
          onblur="restoreZero(this)"
          oninput="onInput('${staffId}')">
      </td>
      <td>
        <input class="num-input" type="number" min="0"
          id="inp_${staffId}_${m.key}_sales"
          value="${sales || ''}" placeholder="0"
          inputmode="numeric"
          onfocus="clearZero(this)"
          onblur="restoreZero(this)"
          oninput="onInput('${staffId}')">
      </td>
      <td class="ratio-cell" id="ratio_${staffId}_${m.key}" style="color:${m.color}">
        ${pct ? pct + '%' : '—'}
      </td>
    </tr>
    <tr>
      <td colspan="4" class="ratio-bar-wrap" style="padding:0 4px 6px;">
        <div class="ratio-bar-track">
          <div class="ratio-bar-fill" id="bar_${staffId}_${m.key}"
               style="width:${pct}%;background:${m.color}"></div>
        </div>
      </td>
    </tr>`;
  }).join('');

  updateSummary(staffId);
}

// ── カード開閉 ──
function toggleCard(staffId) {
  const card = document.getElementById('card_' + staffId);
  card.classList.toggle('open');
}

// ── 入力時リアルタイム更新 ──
function onInput(staffId) {
  // 構成比リアルタイム更新
  let totalSales = 0;
  MENUS.forEach(m => {
    const v = parseInt(document.getElementById(`inp_${staffId}_${m.key}_sales`)?.value) || 0;
    totalSales += v;
  });
  MENUS.forEach(m => {
    const v   = parseInt(document.getElementById(`inp_${staffId}_${m.key}_sales`)?.value) || 0;
    const pct = totalSales ? Math.round(v / totalSales * 100) : 0;
    const ratioEl = document.getElementById(`ratio_${staffId}_${m.key}`);
    const barEl   = document.getElementById(`bar_${staffId}_${m.key}`);
    if (ratioEl) ratioEl.textContent = totalSales ? pct + '%' : '—';
    if (barEl)   barEl.style.width   = pct + '%';
  });
  updateSummary(staffId);
}

function updateSummary(staffId) {
  let totalCnt = 0, totalSales = 0;
  MENUS.forEach(m => {
    totalCnt   += parseInt(document.getElementById(`inp_${staffId}_${m.key}_cnt`)?.value)   || 0;
    totalSales += parseInt(document.getElementById(`inp_${staffId}_${m.key}_sales`)?.value) || 0;
  });
  const el = document.getElementById('sum_' + staffId);
  if (el) el.innerHTML = `
    <span class="sum-chip">件数 <span>${totalCnt}件</span></span>
    <span class="sum-chip" style="margin-left:12px;">売上 <span>${totalSales ? totalSales.toLocaleString() + '円' : '—'}</span></span>
  `;
}

// ── ゼロクリア ──
function clearZero(el) {
  if (el.value === '0' || el.value === '') el.value = '';
}
function restoreZero(el) {
  if (el.value === '') el.value = '';
}

// ── 保存 ──
function saveStaff(staffId) {
  const data = Object.fromEntries(MENUS.map(m => [m.key, {
    cnt:   parseInt(document.getElementById(`inp_${staffId}_${m.key}_cnt`)?.value)   || 0,
    sales: parseInt(document.getElementById(`inp_${staffId}_${m.key}_sales`)?.value) || 0,
  }]));
  setStaffDay(currentMonth, currentDay, staffId, data);
  showToast('✓ 保存しました');
  // ヘッダーの合計を更新
  buildContent();
  // 保存後も該当カードを開いたままにする
  setTimeout(() => {
    const card = document.getElementById('card_' + staffId);
    if (card) card.classList.add('open');
  }, 50);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── 初期化 ──
buildMonthTabs();
buildDateSelect();
buildContent();
</script>
</body>
</html>
