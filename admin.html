<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>T ring — 管理画面</title>
<style>
:root{--bg:#8a8680;--bg2:#6e6a65;--card:#fff;--border:#dddad5;--ink:#2a2825;--muted:#888078;--gold:#9a7e5a;--gold-l:#b89a70;--sage:#4e8a68;--rose:#a04848;--r:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Meiryo','メイリオ','Hiragino Kaku Gothic ProN',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding-bottom:60px;-webkit-font-smoothing:antialiased;}

.header{background:var(--bg2);padding:48px 16px 14px;border-bottom:1px solid rgba(0,0,0,.15);position:sticky;top:0;z-index:30;display:flex;justify-content:space-between;align-items:flex-end;}
.header-logo{font-size:16px;font-weight:500;color:#fff;letter-spacing:.04em;}
.header-sub{font-size:9px;color:rgba(255,255,255,.5);letter-spacing:.14em;text-transform:uppercase;margin-top:2px;}
.back-btn{font-size:11px;color:rgba(255,255,255,.7);text-decoration:none;border:1px solid rgba(255,255,255,.3);padding:6px 14px;border-radius:20px;white-space:nowrap;}

/* Tab nav */
.tab-nav{display:flex;background:var(--bg2);border-bottom:1px solid rgba(0,0,0,.1);padding:0 16px;}
.tab-btn{flex:1;padding:11px 0;font-size:12px;font-weight:500;color:rgba(255,255,255,.5);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;letter-spacing:.06em;transition:all .2s;-webkit-tap-highlight-color:transparent;}
.tab-btn.active{color:var(--gold-l);border-bottom-color:var(--gold-l);}

/* Month + Date bar */
.ctrl-bar{background:var(--bg2);padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(0,0,0,.1);position:sticky;top:100px;z-index:20;}
.ctrl-select{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:5px 10px;font-size:13px;font-weight:500;-webkit-appearance:none;cursor:pointer;}
.today-btn{margin-left:auto;font-size:11px;color:var(--gold-l);background:transparent;border:1px solid rgba(184,154,112,.4);padding:5px 12px;border-radius:16px;cursor:pointer;-webkit-tap-highlight-color:transparent;}

/* Cards */
.sec{padding:12px 14px 4px;}
.sec-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.sec-label::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1);}

.card{background:var(--card);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);}
.card-head{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;}
.avatar{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;border:1px solid var(--border);}
.staff-info{flex:1;min-width:0;}
.staff-name{font-size:14px;font-weight:500;}
.staff-role{font-size:10px;color:var(--muted);margin-top:1px;}
.staff-right{text-align:right;flex-shrink:0;}
.staff-sales{font-size:14px;font-weight:600;color:var(--gold);}
.staff-cnt{font-size:10px;color:var(--muted);margin-top:2px;}
.chevron{font-size:13px;color:var(--muted);transition:transform .2s;flex-shrink:0;}
.card.open .chevron{transform:rotate(180deg);}

.card-body{display:none;padding:14px 16px;}
.card.open .card-body{display:block;}

/* Menu rows */
.menu-rows{}
.menu-row{display:grid;grid-template-columns:1fr 80px 1fr auto;align-items:center;gap:8px;margin-bottom:10px;}
.menu-row:last-child{margin-bottom:0;}
.menu-name{font-size:12px;display:flex;align-items:center;gap:6px;}
.mdot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.unit-price{font-size:10px;color:var(--muted);text-align:right;white-space:nowrap;}
.num-input{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;color:var(--ink);background:#faf9f7;text-align:right;-webkit-appearance:none;transition:border-color .2s;}
.num-input:focus{outline:none;border-color:var(--gold);background:#fff;}
.row-pct{font-size:12px;font-weight:600;min-width:38px;text-align:right;}

.bar-row{grid-column:1/-1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:-6px;margin-bottom:4px;}
.bar-fill{height:100%;border-radius:2px;transition:width .35s;}

.card-footer{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--border);margin-top:8px;}
.footer-sum{font-size:11px;color:var(--muted);}
.footer-sum span{font-weight:600;color:var(--ink);}
.save-btn{padding:8px 20px;background:var(--gold);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s;}
.save-btn:active{background:#7a6040;}

/* Summary card */
.sum-card{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:0 2px 12px rgba(0,0,0,.08);}
.sum-card-title{font-size:11px;color:var(--muted);margin-bottom:12px;letter-spacing:.06em;}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.sg-label{font-size:10px;color:var(--muted);}
.sg-val{font-size:20px;font-weight:600;color:var(--ink);margin-top:2px;}
.sg-sub{font-size:10px;color:var(--muted);margin-top:1px;}

.mbar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.mbar-name{font-size:11px;color:var(--muted);width:70px;flex-shrink:0;display:flex;align-items:center;gap:4px;}
.mbar-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.mbar-fill{height:100%;border-radius:3px;transition:width .4s;}
.mbar-pct{font-size:11px;font-weight:600;min-width:36px;text-align:right;}
.mbar-cnt{font-size:10px;color:var(--muted);min-width:32px;text-align:right;}

/* Progress */
.prog-card{background:var(--card);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 12px rgba(0,0,0,.08);}
.prog-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.prog-label{font-size:11px;color:var(--muted);}
.prog-val{font-size:13px;font-weight:600;color:var(--gold);}
.prog-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--gold);border-radius:3px;transition:width .5s;}
.prog-days{display:flex;justify-content:space-between;margin-top:5px;font-size:10px;color:var(--muted);}

/* Menu master tab */
.master-card{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:0 2px 12px rgba(0,0,0,.08);}
.master-title{font-size:13px;font-weight:500;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.master-row{display:grid;grid-template-columns:1fr auto 1fr auto;align-items:center;gap:8px;margin-bottom:10px;}
.master-row:last-child{margin-bottom:0;}
.master-label{font-size:12px;display:flex;align-items:center;gap:6px;}
.master-price-wrap{display:flex;align-items:center;gap:4px;}
.yen-label{font-size:12px;color:var(--muted);}
.master-input{width:90px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;color:var(--ink);background:#faf9f7;text-align:right;-webkit-appearance:none;transition:border-color .2s;}
.master-input:focus{outline:none;border-color:var(--gold);background:#fff;}
.master-save-btn{width:100%;padding:13px;background:var(--gold);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;margin-top:14px;letter-spacing:.04em;-webkit-tap-highlight-color:transparent;}
.master-save-btn:active{background:#7a6040;}
.menu-note{font-size:11px;color:var(--muted);line-height:1.7;padding:10px 0 0;}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2a2825;color:#fff;font-size:13px;padding:10px 22px;border-radius:20px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-logo">T ring 天王町</div>
    <div class="header-sub">管理画面</div>
  </div>
  <a href="index.html" class="back-btn">← 閲覧画面</a>
</div>

<div class="tab-nav">
  <button class="tab-btn active" id="tab-input" onclick="switchTab('input')">日次入力</button>
  <button class="tab-btn" id="tab-master" onclick="switchTab('master')">メニュー設定</button>
</div>

<!-- 入力タブ -->
<div id="pane-input">
  <div class="ctrl-bar">
    <select class="ctrl-select" id="monthSel" onchange="onMonthChange()"></select>
    <select class="ctrl-select" id="daySel" onchange="onDayChange()"></select>
    <button class="today-btn" onclick="goToday()">今日</button>
  </div>
  <div id="inputContent"></div>
</div>

<!-- マスタタブ -->
<div id="pane-master" style="display:none;">
  <div class="sec" style="padding-top:16px;">
    <div class="master-card">
      <div class="master-title">メニューマスタ — 平均単価設定</div>
      <div id="masterRows"></div>
      <p class="menu-note">※ 平均単価を設定してください。<br>管理画面の件数入力時に自動で売上計算されます。</p>
      <button class="master-save-btn" onclick="saveMaster()">保存する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══ デフォルトメニューマスタ ══
const DEFAULT_MENUS = [
  {key:'cut',   label:'カット',      color:'#4a6e8a', price:5000},
  {key:'color', label:'カラー',      color:'#9a7e5a', price:9000},
  {key:'perm',  label:'パーマ',      color:'#7a70a0', price:12000},
  {key:'tr',    label:'トリートメント', color:'#4e8a68', price:6000},
  {key:'perm2', label:'縮毛矯正',    color:'#a04848', price:18000},
  {key:'spa',   label:'ヘッドスパ',  color:'#6a607a', price:4000},
];

const STAFF = [
  {id:'yamashita', name:'山下 大貴', role:'Top Stylist', ini:'山下', bg:'rgba(184,154,112,.15)', tc:'#b89a70'},
  {id:'araki',     name:'新木 彩加',  role:'Top Stylist', ini:'新木', bg:'rgba(122,170,138,.15)', tc:'#7aaa8a'},
  {id:'tomioka',   name:'富岡 輝',   role:'Top Stylist', ini:'富岡', bg:'rgba(122,174,201,.15)', tc:'#7aaec9'},
  {id:'hatanaka',  name:'畑中 守',   role:'Manager',     ini:'畑中', bg:'rgba(160,142,201,.15)', tc:'#a08ec9'},
  {id:'migihashi', name:'右橋 陸',   role:'Manager',     ini:'右橋', bg:'rgba(212,135,122,.15)', tc:'#d4877a'},
  {id:'fujita',    name:'藤田 龍法', role:'Owner',       ini:'藤田', bg:'rgba(200,184,160,.15)', tc:'#b09a70'},
];

const MONTHS = [
  {key:'2025-01',label:'2025年1月',days:31},
  {key:'2025-02',label:'2025年2月',days:28},
  {key:'2025-03',label:'2025年3月',days:31},
  {key:'2025-04',label:'2025年4月',days:30},
  {key:'2025-05',label:'2025年5月',days:31},
];

// ══ 状態 ══
let currentMonth = (() => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
})();
// 存在しない月はデフォルトに
if (!MONTHS.find(m => m.key === currentMonth)) currentMonth = '2025-04';
let currentDay = new Date().getDate();
let currentTab = 'input';

// ══ メニューマスタ取得 ══
function getMenus() {
  const raw = localStorage.getItem('tring_menus');
  return raw ? JSON.parse(raw) : DEFAULT_MENUS;
}
function saveMenusToStorage(menus) {
  localStorage.setItem('tring_menus', JSON.stringify(menus));
  // 閲覧画面用にも保存
  localStorage.setItem('tring_menus_updated', Date.now());
}

// ══ 日次データ ══
function dayKey(month, day, sid) {
  return `tring_d_${month}_${String(day).padStart(2,'0')}_${sid}`;
}
function getStaffDay(month, day, sid) {
  const raw = localStorage.getItem(dayKey(month, day, sid));
  if (raw) return JSON.parse(raw);
  const menus = getMenus();
  return Object.fromEntries(menus.map(m => [m.key, 0]));
}
function setStaffDay(month, day, sid, data) {
  localStorage.setItem(dayKey(month, day, sid), JSON.stringify(data));
  // 閲覧画面に通知
  localStorage.setItem('tring_data_updated', Date.now());
}

// 月累積
function getCumulative(month, upToDay) {
  const menus = getMenus();
  const res = {};
  STAFF.forEach(s => { res[s.id] = Object.fromEntries(menus.map(m => [m.key, 0])); });
  for (let d = 1; d <= upToDay; d++) {
    STAFF.forEach(s => {
      const day = getStaffDay(month, d, s.id);
      menus.forEach(m => { res[s.id][m.key] += (day[m.key] || 0); });
    });
  }
  return res;
}

// ══ フォーマット ══
function yen(n) { return n ? n.toLocaleString('ja-JP') + '円' : '—'; }

// ══ タブ ══
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('pane-input').style.display  = tab==='input'  ? '' : 'none';
  document.getElementById('pane-master').style.display = tab==='master' ? '' : 'none';
  document.getElementById('tab-input').classList.toggle('active',  tab==='input');
  document.getElementById('tab-master').classList.toggle('active', tab==='master');
  if (tab === 'master') buildMaster();
}

// ══ コントロールバー ══
function buildCtrls() {
  const ms = document.getElementById('monthSel');
  ms.innerHTML = MONTHS.map(m => `<option value="${m.key}" ${m.key===currentMonth?'selected':''}>${m.label}</option>`).join('');
  buildDaySel();
}
function buildDaySel() {
  const mo = MONTHS.find(m => m.key === currentMonth);
  const ds = document.getElementById('daySel');
  ds.innerHTML = Array.from({length: mo.days}, (_,i) => {
    const d = i+1;
    return `<option value="${d}" ${d===currentDay?'selected':''}>${d}日</option>`;
  }).join('');
}
function onMonthChange() {
  currentMonth = document.getElementById('monthSel').value;
  currentDay = 1;
  buildDaySel();
  buildInputContent();
}
function onDayChange() {
  currentDay = parseInt(document.getElementById('daySel').value);
  buildInputContent();
}
function goToday() {
  const d = new Date();
  const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  if (MONTHS.find(m => m.key === key)) { currentMonth = key; currentDay = d.getDate(); }
  else { currentDay = d.getDate(); }
  buildCtrls();
  buildInputContent();
}

// ══ 入力コンテンツ ══
function buildInputContent() {
  const menus    = getMenus();
  const cumul    = getCumulative(currentMonth, currentDay);
  const todayMap = {};
  STAFF.forEach(s => { todayMap[s.id] = getStaffDay(currentMonth, currentDay, s.id); });

  // 全体集計
  let totalSales = 0, totalCnt = 0;
  const menuTotals = Object.fromEntries(menus.map(m => [m.key, {cnt:0,sales:0}]));
  STAFF.forEach(s => {
    menus.forEach(m => {
      const cnt = cumul[s.id][m.key] || 0;
      const sales = cnt * m.price;
      menuTotals[m.key].cnt   += cnt;
      menuTotals[m.key].sales += sales;
      totalSales += sales;
      totalCnt   += cnt;
    });
  });

  const mo = MONTHS.find(m => m.key === currentMonth);
  const prog = Math.round(currentDay / mo.days * 100);

  let html = `<div class="sec">`;

  // 進捗
  html += `
  <div class="prog-card">
    <div class="prog-header">
      <div class="prog-label">${mo.label} 累計（〜${currentDay}日）</div>
      <div class="prog-val">${yen(totalSales)}</div>
    </div>
    <div class="prog-track"><div class="prog-fill" style="width:${prog}%"></div></div>
    <div class="prog-days"><span>1日</span><span>${currentDay}日（${prog}%経過）</span><span>${mo.days}日</span></div>
  </div>`;

  // メニュー別集計
  html += `<div class="sum-card">
    <div class="sum-card-title">メニュー別累計（件数・構成比）</div>`;
  menus.forEach(m => {
    const pct = totalSales ? Math.round(menuTotals[m.key].sales / totalSales * 100) : 0;
    html += `
    <div class="mbar-row">
      <div class="mbar-name"><span class="mdot" style="background:${m.color}"></span>${m.label}</div>
      <div class="mbar-track"><div class="mbar-fill" style="width:${pct}%;background:${m.color}"></div></div>
      <div class="mbar-pct" style="color:${m.color}">${pct}%</div>
      <div class="mbar-cnt">${menuTotals[m.key].cnt}件</div>
    </div>`;
  });
  html += `<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);padding-top:10px;border-top:1px solid var(--border);margin-top:6px;">
    <span>合計 ${totalCnt}件</span><span style="font-weight:600;color:var(--ink)">${yen(totalSales)}</span>
  </div></div>`;

  // スタッフ入力カード
  html += `<div class="sec-label">${currentDay}日 — スタッフ別入力</div>`;

  STAFF.forEach(s => {
    const todayCnt = menus.reduce((a,m) => a + (todayMap[s.id][m.key]||0), 0);
    const todaySales = menus.reduce((a,m) => a + (todayMap[s.id][m.key]||0)*m.price, 0);
    const monthSales = menus.reduce((a,m) => a + (cumul[s.id][m.key]||0)*m.price, 0);

    html += `
    <div class="card" id="card_${s.id}">
      <div class="card-head" onclick="toggleCard('${s.id}')">
        <div class="avatar" style="background:${s.bg};color:${s.tc}">${s.ini}</div>
        <div class="staff-info">
          <div class="staff-name">${s.name}</div>
          <div class="staff-role">${s.role}</div>
        </div>
        <div class="staff-right">
          <div class="staff-sales">${todaySales ? yen(todaySales) : '未入力'}</div>
          <div class="staff-cnt">月計 ${yen(monthSales)}</div>
        </div>
        <div class="chevron">▾</div>
      </div>
      <div class="card-body" id="body_${s.id}">
        <div class="menu-rows" id="rows_${s.id}"></div>
        <div class="card-footer">
          <div class="footer-sum" id="fsum_${s.id}"></div>
          <button class="save-btn" onclick="saveStaff('${s.id}')">保存</button>
        </div>
      </div>
    </div>`;
  });

  html += `</div>`;
  document.getElementById('inputContent').innerHTML = html;

  // 各スタッフのテーブルを描画
  STAFF.forEach(s => renderStaffRows(s.id, todayMap[s.id]));
}

function renderStaffRows(sid, dayData) {
  const menus = getMenus();
  const el = document.getElementById('rows_' + sid);
  if (!el) return;

  const totalSales = menus.reduce((a,m) => a + (dayData[m.key]||0)*m.price, 0);

  el.innerHTML = menus.map(m => {
    const cnt   = dayData[m.key] || 0;
    const sales = cnt * m.price;
    const pct   = totalSales ? Math.round(sales / totalSales * 100) : 0;
    return `
    <div class="menu-row">
      <div class="menu-name"><span class="mdot" style="background:${m.color}"></span>${m.label}</div>
      <div class="unit-price">${m.price.toLocaleString()}円</div>
      <input class="num-input" type="number" min="0" inputmode="numeric"
        id="inp_${sid}_${m.key}"
        value="${cnt || ''}" placeholder="0"
        onfocus="this.value=this.value||''"
        oninput="onInput('${sid}')">
      <div class="row-pct" id="pct_${sid}_${m.key}" style="color:${m.color}">${pct?pct+'%':'—'}</div>
    </div>
    <div class="bar-row"><div class="bar-fill" id="bar_${sid}_${m.key}" style="width:${pct}%;background:${m.color}"></div></div>`;
  }).join('');

  updateFooterSum(sid);
}

function onInput(sid) {
  const menus = getMenus();
  const totalSales = menus.reduce((a,m) => {
    const cnt = parseInt(document.getElementById(`inp_${sid}_${m.key}`)?.value) || 0;
    return a + cnt * m.price;
  }, 0);
  menus.forEach(m => {
    const cnt   = parseInt(document.getElementById(`inp_${sid}_${m.key}`)?.value) || 0;
    const sales = cnt * m.price;
    const pct   = totalSales ? Math.round(sales / totalSales * 100) : 0;
    const pe = document.getElementById(`pct_${sid}_${m.key}`);
    const be = document.getElementById(`bar_${sid}_${m.key}`);
    if (pe) pe.textContent = totalSales ? pct + '%' : '—';
    if (be) be.style.width = pct + '%';
  });
  updateFooterSum(sid);
}

function updateFooterSum(sid) {
  const menus = getMenus();
  let cnt = 0, sales = 0;
  menus.forEach(m => {
    const c = parseInt(document.getElementById(`inp_${sid}_${m.key}`)?.value) || 0;
    cnt   += c;
    sales += c * m.price;
  });
  const el = document.getElementById('fsum_' + sid);
  if (el) el.innerHTML = `<span>${cnt}件 / <span>${yen(sales)}</span></span>`;
}

function toggleCard(sid) {
  document.getElementById('card_' + sid).classList.toggle('open');
}

function saveStaff(sid) {
  const menus = getMenus();
  const data = Object.fromEntries(menus.map(m => [
    m.key, parseInt(document.getElementById(`inp_${sid}_${m.key}`)?.value) || 0
  ]));
  setStaffDay(currentMonth, currentDay, sid, data);
  showToast('✓ 保存しました');
  buildInputContent();
  setTimeout(() => {
    document.getElementById('card_' + sid)?.classList.add('open');
  }, 60);
}

// ══ メニューマスタ ══
function buildMaster() {
  const menus = getMenus();
  document.getElementById('masterRows').innerHTML = menus.map(m => `
    <div class="master-row">
      <div class="master-label"><span class="mdot" style="background:${m.color}"></span>${m.label}</div>
      <div></div>
      <div class="master-price-wrap">
        <input class="master-input" type="number" min="0" inputmode="numeric"
          id="mp_${m.key}" value="${m.price}"
          onfocus="if(this.value==='0')this.value=''">
        <span class="yen-label">円</span>
      </div>
      <div></div>
    </div>`).join('');
}

function saveMaster() {
  const menus = getMenus();
  menus.forEach(m => {
    const v = parseInt(document.getElementById('mp_' + m.key)?.value) || 0;
    m.price = v;
  });
  saveMenusToStorage(menus);
  showToast('✓ メニュー設定を保存しました');
}

// ══ Toast ══
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ══ Init ══
buildCtrls();
buildInputContent();
</script>
</body>
</html>
