<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>T ring 天王町 — Sales Report</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#8a8680; --bg2:#6e6a65;
  --card:#ffffff; --card2:#f5f4f2;
  --border:#dddad5; --border2:#e8e5e0;
  --ink:#2a2825; --ink2:#3d3a36;
  --muted:#888078; --muted2:#b0a89e;
  --gold:#9a7e5a; --gold-l:#b89a70;
  --sage:#4e8a68; --sky:#4a6e8a;
  --rose:#a04848; --lav:#6a607a;
  --radius:14px; --nav-h:68px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:'Meiryo','メイリオ','Hiragino Kaku Gothic ProN',sans-serif;background:var(--bg);color:var(--ink);font-weight:400;-webkit-font-smoothing:antialiased;}

/* Header */
.header{background:var(--bg2);border-bottom:1px solid rgba(0,0,0,.15);padding:48px 20px 14px;position:fixed;top:0;left:0;right:0;z-index:20;}
.header-top{display:flex;justify-content:space-between;align-items:center;}
.salon-name-en{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:22px;color:#fff;letter-spacing:.06em;line-height:1;}
.salon-name-sub{font-size:9px;color:rgba(255,255,255,.5);letter-spacing:.18em;text-transform:uppercase;margin-top:3px;}
.month-badge{border:1px solid rgba(255,255,255,.35);color:rgba(255,255,255,.9);background:transparent;font-size:11px;padding:6px 14px;border-radius:20px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;gap:6px;letter-spacing:.04em;transition:background .2s;}
.month-badge:active{background:rgba(255,255,255,.08);}
.badge-arrow{font-size:9px;color:rgba(255,255,255,.5);}

/* Month overlay */
.month-overlay{display:none;position:fixed;inset:0;z-index:40;background:rgba(30,28,25,.6);backdrop-filter:blur(6px);align-items:flex-start;justify-content:flex-end;padding:100px 18px 0;}
.month-overlay.open{display:flex;}
.month-picker{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;min-width:180px;box-shadow:0 16px 48px rgba(0,0,0,.2);animation:dropIn .18s ease;}
@keyframes dropIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.month-picker-title{font-size:10px;color:var(--muted);letter-spacing:.18em;padding:12px 16px 9px;border-bottom:1px solid var(--border);text-transform:uppercase;}
.month-option{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border2);-webkit-tap-highlight-color:transparent;}
.month-option:last-child{border-bottom:none;}
.month-option:active{background:rgba(0,0,0,.04);}
.month-option.selected{background:rgba(154,126,90,.08);}
.month-option-label{font-size:14px;font-weight:400;color:var(--ink);}
.month-option-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.month-option.selected .month-option-label{color:var(--gold);}
.month-check{color:var(--gold);font-size:13px;opacity:0;}
.month-option.selected .month-check{opacity:1;}

/* Viewport */
.viewport{position:fixed;left:0;right:0;bottom:var(--nav-h);overflow:hidden;}
.slides-track{display:flex;width:300%;height:100%;will-change:transform;}
.slide{width:calc(100%/3);height:100%;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:18px 14px calc(18px + env(safe-area-inset-bottom));}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--bg2);border-top:1px solid rgba(0,0,0,.15);display:flex;align-items:center;padding:0 10px;padding-bottom:env(safe-area-inset-bottom);z-index:20;gap:6px;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;-webkit-tap-highlight-color:transparent;height:52px;border-radius:12px;transition:background .25s,border-color .25s;border:1px solid transparent;}
.nav-item.active{background:rgba(255,255,255,.1);border-color:var(--gold-l);}
.nav-icon{display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.45);transition:transform .3s cubic-bezier(.34,1.56,.64,1),color .25s;}
.nav-label{font-size:10px;font-weight:400;color:rgba(255,255,255,.45);transition:color .25s;letter-spacing:.06em;}
.nav-item.active .nav-label{color:var(--gold-l);font-weight:500;}
.nav-item.active .nav-icon{transform:scale(1.1);color:var(--gold-l);}

/* Admin link */
.admin-link{position:fixed;bottom:calc(var(--nav-h) + 10px);right:14px;z-index:19;background:var(--bg2);color:rgba(255,255,255,.75);font-size:11px;padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.2);text-decoration:none;letter-spacing:.06em;box-shadow:0 2px 8px rgba(0,0,0,.2);}

/* Section label */
.sec-label{font-size:10px;letter-spacing:.14em;color:var(--muted);margin-bottom:12px;margin-top:24px;text-transform:uppercase;}
.sec-label:first-child{margin-top:0;}

/* KPI cards */
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:border-color .2s;}
.kpi-card.expanded{border-color:var(--gold);}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.kpi-card.c-gold::before{background:var(--gold-l);}
.kpi-card.c-sage::before{background:var(--sage);}
.kpi-card.c-sky::before{background:var(--sky);}
.kpi-card.c-rose::before{background:var(--rose);}
.kpi-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.kpi-label{font-size:11px;color:var(--muted);}
.kpi-arrow{font-size:11px;color:var(--muted2);transition:transform .2s;}
.kpi-card.expanded .kpi-arrow{transform:rotate(180deg);color:var(--gold);}
.kpi-value{font-size:20px;font-weight:600;color:var(--ink);line-height:1.2;word-break:break-all;}
.kpi-badge{display:inline-block;font-size:10px;padding:3px 9px;border-radius:20px;margin-top:7px;font-weight:500;letter-spacing:.04em;}
.kpi-badge.up{background:#5a9e78;color:#fff;}
.kpi-badge.down{background:#b85c5c;color:#fff;}
.kpi-detail{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border2);}
.kpi-card.expanded .kpi-detail{display:block;}
.kpi-detail-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;margin-bottom:8px;}
.kpi-detail-row:last-child{margin-bottom:0;}
.kpi-detail-name{color:var(--muted);}
.kpi-detail-val{font-weight:500;color:var(--ink2);}
.kpi-mini-bar{width:100%;height:3px;background:var(--border);border-radius:2px;margin:5px 0 9px;overflow:hidden;}
.kpi-mini-bar-fill{height:100%;border-radius:2px;}

/* Donut */
.donut-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
.pie-title{font-size:13px;font-weight:500;margin-bottom:16px;color:var(--ink2);}
.pie-wrap{display:flex;align-items:center;gap:18px;}
svg.pie{flex-shrink:0;}
.legend{flex:1;display:flex;flex-direction:column;gap:10px;}
.legend-item{display:flex;align-items:center;gap:8px;}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.legend-name{font-size:11px;color:var(--muted);flex:1;}
.legend-pct{font-size:13px;font-weight:600;color:var(--ink);}

/* Staff cards */
.staff-list{display:flex;flex-direction:column;gap:10px;}
.staff-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:border-color .2s;}
.staff-card.expanded{border-color:var(--gold);}
.staff-header{display:flex;align-items:center;gap:12px;}
.avatar{width:40px;height:40px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;border:1px solid var(--border);}
.staff-info{flex:1;min-width:0;}
.staff-name{font-size:14px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.staff-role{font-size:11px;color:var(--muted);margin-top:2px;}
.staff-right{text-align:right;flex-shrink:0;}
.staff-sales-val{font-size:13px;font-weight:600;color:var(--gold);}
.staff-sales-cnt{font-size:10px;color:var(--muted);margin-top:2px;}
.rank{width:18px;height:18px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;margin-left:4px;vertical-align:middle;}
.rank-1{background:rgba(184,154,112,.2);color:var(--gold);}
.rank-2{background:rgba(0,0,0,.06);color:var(--muted);}
.rank-3{background:rgba(0,0,0,.04);color:var(--muted2);}
.chevron{font-size:12px;color:var(--muted2);transition:transform .2s;flex-shrink:0;}
.staff-card.expanded .chevron{transform:rotate(180deg);color:var(--gold);}
.breakdown{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border2);}
.staff-card.expanded .breakdown{display:block;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.bar-label{font-size:10px;color:var(--muted);width:68px;flex-shrink:0;}
.bar-track{flex:1;height:4px;background:var(--border);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;}
.bar-val{font-size:10px;color:var(--ink2);width:36px;text-align:right;flex-shrink:0;}

/* Service grid */
.service-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.service-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 14px;text-align:center;}
.service-icon{display:flex;align-items:center;justify-content:center;margin-bottom:8px;color:rgba(42,40,37,.4);}
.service-name{font-size:11px;color:var(--muted);letter-spacing:.06em;margin-bottom:6px;}
.service-pct{font-size:28px;font-weight:600;color:var(--ink);line-height:1;}
.service-pct span{font-size:14px;}
.service-cnt{font-size:10px;color:var(--muted);margin-top:8px;line-height:2;}

/* Staff×Menu */
.sbdown-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.divider{height:1px;background:var(--border2);margin:10px 0;}

/* No data */
.no-data{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;color:var(--muted);}
.no-data-icon{font-size:36px;margin-bottom:16px;opacity:.4;}
.no-data-text{font-size:13px;line-height:1.8;}
</style>
</head>
<body>

<div class="month-overlay" id="monthOverlay" onclick="closeMonthPicker(event)">
  <div class="month-picker" id="monthPicker">
    <div class="month-picker-title">Month</div>
  </div>
</div>

<div class="header">
  <div class="header-top">
    <div>
      <div class="salon-name-en">T ring 天王町</div>
      <div class="salon-name-sub">Sales Report</div>
    </div>
    <div class="month-badge" id="monthBadge" onclick="openMonthPicker()">
      <span id="monthBadgeText">—</span>
      <span class="badge-arrow">▾</span>
    </div>

</div>

<div class="viewport" id="viewport">
  <div class="slides-track" id="slidesTrack">
    <div class="slide" id="slide-0">
      <div class="sec-label">Summary</div>
      <div class="kpi-row">
        <div class="kpi-card c-gold" onclick="toggleKpi(this)">
          <div class="kpi-top"><div class="kpi-label">総売上</div><div class="kpi-arrow">▾</div></div>
          <div class="kpi-value" id="kpi-sales">—</div>
          <div class="kpi-badge" id="kpi-sales-badge"></div>
          <div class="kpi-detail" id="kpi-sales-detail"></div>
        </div>
        <div class="kpi-card c-sage" onclick="toggleKpi(this)">
          <div class="kpi-top"><div class="kpi-label">来客数</div><div class="kpi-arrow">▾</div></div>
          <div class="kpi-value" id="kpi-clients">—</div>
          <div class="kpi-badge" id="kpi-clients-badge"></div>
          <div class="kpi-detail" id="kpi-clients-detail"></div>
        </div>
      </div>
      <div class="kpi-row">
        <div class="kpi-card c-sky" onclick="toggleKpi(this)">
          <div class="kpi-top"><div class="kpi-label">客単価</div><div class="kpi-arrow">▾</div></div>
          <div class="kpi-value" id="kpi-avg">—</div>
          <div class="kpi-badge" id="kpi-avg-badge"></div>
          <div class="kpi-detail" id="kpi-avg-detail"></div>
        </div>
        <div class="kpi-card c-rose" onclick="toggleKpi(this)">
          <div class="kpi-top"><div class="kpi-label">メニュー数</div><div class="kpi-arrow">▾</div></div>
          <div class="kpi-value" id="kpi-menu">—</div>
          <div class="kpi-badge" id="kpi-menu-badge"></div>
          <div class="kpi-detail" id="kpi-menu-detail"></div>
        </div>
      </div>
      <div class="sec-label">Menu Ratio</div>
      <div class="donut-wrap">
        <div class="pie-title">メニュー構成比</div>
        <div class="pie-wrap">
          <svg class="pie" width="110" height="110" viewBox="0 0 110 110" id="donutSvg"></svg>
          <div class="legend" id="donutLegend"></div>

    <div class="slide" id="slide-1">

    <div class="slide" id="slide-2">

        <div id="staffMenuBreakdown" style="display:flex;flex-direction:column;gap:14px;"></div>
      </div>

</div>

  <div class="nav-item active" id="nav-0" onclick="goTo(0)">
    <div class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="8" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="11" width="7" height="10" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg></div>

  <div class="nav-item" id="nav-1" onclick="goTo(1)">
    <div class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="3"/><circle cx="17" cy="8" r="2.5"/><path d="M2 20c0-3.3 3.1-6 7-6s7 2.7 7 6"/><path d="M22 20c0-2.5-2.2-4.5-5-4.5"/></svg></div>
    <div class="nav-label">スタッフ</div>

    <div class="nav-label">メニュー</div>

<script>
// ══ 定数 ══
const STAFF = [
  {id:'yamashita', name:'山下 大貴', role:'Top Stylist', ini:'山下', bg:'rgba(184,154,112,.15)', tc:'#b89a70'},
  {id:'araki',     name:'新木 彩加',  role:'Top Stylist', ini:'新木', bg:'rgba(122,170,138,.15)', tc:'#7aaa8a'},
  {id:'tomioka',   name:'富岡 輝',   role:'Top Stylist', ini:'富岡', bg:'rgba(122,174,201,.15)', tc:'#7aaec9'},
  {id:'hatanaka',  name:'畑中 守',   role:'Manager',     ini:'畑中', bg:'rgba(160,142,201,.15)', tc:'#a08ec9'},
  {id:'migihashi', name:'右橋 陸',   role:'Manager',     ini:'右橋', bg:'rgba(212,135,122,.15)', tc:'#d4877a'},
  {id:'fujita',    name:'藤田 龍法', role:'Owner',       ini:'藤田', bg:'rgba(200,184,160,.15)', tc:'#b09a70'},
];

const DEFAULT_MENUS = [
  {key:'cut',   label:'カット',      color:'#4a6e8a', price:5000},
  {key:'color', label:'カラー',      color:'#9a7e5a', price:9000},
  {key:'perm',  label:'パーマ',      color:'#7a70a0', price:12000},
  {key:'tr',    label:'トリートメント', color:'#4e8a68', price:6000},
  {key:'perm2', label:'縮毛矯正',    color:'#a04848', price:18000},
  {key:'spa',   label:'ヘッドスパ',  color:'#6a607a', price:4000},
];

const MONTHS = [
  {key:'2025-01',label:'2025年1月',days:31},
  {key:'2025-02',label:'2025年2月',days:28},
  {key:'2025-03',label:'2025年3月',days:31},
  {key:'2025-04',label:'2025年4月',days:30},
  {key:'2025-05',label:'2025年5月',days:31},
];

// ══ 状態 ══
let currentMonth = (() => {
  const d = new Date();
  const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  return MONTHS.find(m=>m.key===k) ? k : '2025-04';
})();
let currentIdx = 0;

// ══ メニュー取得 ══
function getMenus() {
  const raw = localStorage.getItem('tring_menus');
  return raw ? JSON.parse(raw) : DEFAULT_MENUS;
}

// ══ データ集計 ══
function dayKey(month, day, sid) {
  return `tring_d_${month}_${String(day).padStart(2,'0')}_${sid}`;
}
function getStaffDay(month, day, sid) {
  const raw = localStorage.getItem(dayKey(month, day, sid));
  if (raw) return JSON.parse(raw);
  return null;
}

function getMonthData(month) {
  const menus = getMenus();
  const mo    = MONTHS.find(m => m.key === month);
  if (!mo) return null;

  // スタッフ別に全日集計
  const staffData = STAFF.map(s => {
    const menuCounts = Object.fromEntries(menus.map(m => [m.key, 0]));
    let hasData = false;
    for (let d = 1; d <= mo.days; d++) {
      const day = getStaffDay(month, d, s.id);
      if (day) {
        hasData = true;
        menus.forEach(m => { menuCounts[m.key] += (day[m.key] || 0); });
      }
    }
    const totalCnt   = menus.reduce((a,m) => a + menuCounts[m.key], 0);
    const totalSales = menus.reduce((a,m) => a + menuCounts[m.key] * m.price, 0);
    return { ...s, menuCounts, totalCnt, totalSales, hasData };
  });

  const hasAnyData = staffData.some(s => s.hasData);
  if (!hasAnyData) return null;

  // 全体集計
  const menuTotals = Object.fromEntries(menus.map(m => [m.key, {cnt:0, sales:0}]));
  let totalSales = 0, totalCnt = 0;
  staffData.forEach(s => {
    menus.forEach(m => {
      menuTotals[m.key].cnt   += s.menuCounts[m.key];
      menuTotals[m.key].sales += s.menuCounts[m.key] * m.price;
    });
    totalSales += s.totalSales;
    totalCnt   += s.totalCnt;
  });

  // 前月データ
  const prevIdx  = MONTHS.findIndex(m => m.key === month) - 1;
  const prevMonth = prevIdx >= 0 ? MONTHS[prevIdx].key : null;
  const prevData  = prevMonth ? getMonthData(prevMonth) : null;

  return { menus, staffData, menuTotals, totalSales, totalCnt, prevData };
}

// ══ フォーマット ══
function yen(n) { return n.toLocaleString('ja-JP') + '円'; }
function badge(cur, prev) {
  if (!prev || prev === 0) return '';
  const diff = ((cur - prev) / prev * 100).toFixed(1);
  const up   = cur >= prev;
  return `<div class="kpi-badge ${up?'up':'down'}">前月比 ${up?'▲':'▼'} ${Math.abs(diff)}%</div>`;
}

// ══ レンダリング ══
function renderAll() {
  document.getElementById('monthBadgeText').textContent =
    MONTHS.find(m => m.key === currentMonth)?.label || currentMonth;

  const d = getMonthData(currentMonth);

  if (!d) { renderNoData(); return; }

  const { menus, staffData, menuTotals, totalSales, totalCnt, prevData } = d;
  const avgPrice = totalCnt ? Math.round(totalSales / totalCnt) : 0;
  const totalMenuCnt = totalCnt;

  // ── KPI ──
  document.getElementById('kpi-sales').textContent = yen(totalSales);
  document.getElementById('kpi-sales-badge').outerHTML =
    `<div id="kpi-sales-badge">${badge(totalSales, prevData?.totalSales)}</div>`;
  document.getElementById('kpi-sales-detail').innerHTML = prevData

  document.getElementById('kpi-avg').textContent = avgPrice ? yen(avgPrice) : '—';

    `<div id="kpi-avg-badge">${prevAvg ? badge(avgPrice, prevAvg) : ''}</div>`;
  document.getElementById('kpi-avg-detail').innerHTML = prevAvg

  // ── Donut ──
  const circ = 2 * Math.PI * 38;
  let off = 0;
  const circles = menus.map(m => {
    const pct  = totalSales ? menuTotals[m.key].sales / totalSales : 0;
    const dash = (pct * circ).toFixed(2);
    const gap  = (circ - dash).toFixed(2);
    const c = `<circle cx="55" cy="55" r="38" fill="none" stroke="${m.color}" stroke-width="18"
      stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-off}" transform="rotate(-90 55 55)" opacity=".85"/>`;
    off += parseFloat(dash);
    return c;
  }).join('');
  document.getElementById('donutSvg').innerHTML = circles +
    `<circle cx="55" cy="55" r="29" fill="white"/>
     <text x="55" y="52" text-anchor="middle" fill="#2a2825" font-size="12" font-family="Meiryo" font-weight="500">${totalCnt}</text>

    const pct = totalSales ? Math.round(menuTotals[m.key].sales / totalSales * 100) : 0;
    return `<div class="legend-item">
      <div class="legend-dot" style="background:${m.color}"></div>
      <div class="legend-name">${m.label}</div>
      <div class="legend-pct">${pct}%</div>
    </div>`;
  }).join('');

  // ── Staff list ──
  const sorted = [...staffData].filter(s => s.hasData).sort((a,b) => b.totalSales - a.totalSales);
  document.getElementById('staffList').innerHTML = sorted.length ? sorted.map((s,i) => {
    const rank = i+1;
    const rc = rank===1?'rank-1':rank===2?'rank-2':rank===3?'rank-3':'';
    const bars = menus.map(m => {
      const pct = s.totalSales ? Math.round(s.menuCounts[m.key]*m.price/s.totalSales*100) : 0;
      return `<div class="bar-row">
        <div class="bar-label">${m.label}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${m.color}"></div></div>
        <div class="bar-val">${pct}%</div>
      </div>`;
    }).join('');
    return `<div class="staff-card" onclick="this.classList.toggle('expanded')">
      <div class="staff-header">
        <div class="avatar" style="background:${s.bg};color:${s.tc}">${s.ini}</div>

    </div>`;
  }).join('') : `<div class="no-data"><div class="no-data-icon">👥</div><div class="no-data-text">スタッフデータがありません</div></div>`;

  // ── Service grid ──
  document.getElementById('serviceGrid').innerHTML = menus.map(m => {
    const pct = totalSales ? Math.round(menuTotals[m.key].sales / totalSales * 100) : 0;
    return `<div class="service-card">
      <div class="service-name">${m.label}</div>
      <div class="service-pct" style="color:${m.color}">${pct}<span>%</span></div>
      <div class="service-cnt">${menuTotals[m.key].cnt}件<br>${yen(menuTotals[m.key].sales)}</div>
    </div>`;
  }).join('');

  // ── Staff×Menu breakdown ──
  const sb = document.getElementById('staffMenuBreakdown');
  sb.innerHTML = sorted.map((s,i) => `

      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;">

      </div>
      <div style="display:flex;gap:2px;height:6px;border-radius:3px;overflow:hidden;margin-bottom:5px;">
        ${menus.map(m => {
          const pct = s.totalSales ? Math.round(s.menuCounts[m.key]*m.price/s.totalSales*100) : 0;
          return `<div style="width:${pct}%;background:${m.color}"></div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${menus.map(m => {
          const pct = s.totalSales ? Math.round(s.menuCounts[m.key]*m.price/s.totalSales*100) : 0;
          return `<span style="font-size:9px;color:${m.color}">${m.label} ${pct}%</span>`;
        }).join('')}

function openMonthPicker() {
  const p = document.getElementById('monthPicker');
  p.querySelectorAll('.month-option').forEach(e => e.remove());
  [...MONTHS].reverse().forEach(m => {
    const opt = document.createElement('div');
    opt.className = 'month-option' + (m.key===currentMonth?' selected':'');

  document.getElementById('monthOverlay').classList.add('open');
}

}

// ══ スライド ══
const track = document.getElementById('slidesTrack');
function goTo(idx, animate=true) {
  track.style.transition = animate ? 'transform .32s cubic-bezier(.4,0,.2,1)' : 'none';
  currentIdx = idx;
  track.style.transform = `translateX(${-idx*(100/3)}%)`;
  document.querySelectorAll('.nav-item').forEach((n,i) => n.classList.toggle('active', i===idx));
  document.querySelectorAll('.kpi-card.expanded').forEach(c => c.classList.remove('expanded'));
}

// スワイプ
let txStart=0, tyStart=0, txDelta=0, swState='idle';
const vp = document.getElementById('viewport');
vp.addEventListener('touchstart', e => {
  const m = new WebKitCSSMatrix(getComputedStyle(track).transform);
  track.style.transition = 'none';
  track.style.transform  = `translateX(${m.m41}px)`;
  txStart=e.touches[0].clientX; tyStart=e.touches[0].clientY; txDelta=0; swState='idle';
},{passive:true});
vp.addEventListener('touchmove', e => {
  const dx=e.touches[0].clientX-txStart, dy=e.touches[0].clientY-tyStart;
  if (swState==='idle'){ if(Math.abs(dx)<6&&Math.abs(dy)<6)return; swState=Math.abs(dx)>=Math.abs(dy)?'h':'v'; }
  if (swState==='v') return; e.preventDefault(); txDelta=dx;
  let off=dx;
  if ((currentIdx===0&&dx>0)||(currentIdx===2&&dx<0)) off=dx*.25;
  track.style.transform=`translateX(calc(${-currentIdx*(100/3)}% + ${off}px))`;
},{passive:false});
function finishSwipe(){
  if (swState!=='h'){swState='idle';return;} swState='idle';
  const th=window.innerWidth*.2; let next=currentIdx;
  if (txDelta<-th&&currentIdx<2) next=currentIdx+1;
  else if (txDelta>th&&currentIdx>0) next=currentIdx-1;
  track.style.transition='transform .32s cubic-bezier(.4,0,.2,1)';
  currentIdx=next; track.style.transform=`translateX(${-next*(100/3)}%)`;
  document.querySelectorAll('.nav-item').forEach((n,i)=>n.classList.toggle('active',i===next));
  document.querySelectorAll('.kpi-card.expanded').forEach(c=>c.classList.remove('expanded'));
}
vp.addEventListener('touchend', finishSwipe);
vp.addEventListener('touchcancel', finishSwipe);
