<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>T ring 天王町 — Sales Report</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #6b6560;   /* サイトのミディアムグレー */
    --bg2:     #5e5a55;
    --card:    #7a7570;
    --card2:   #726d68;
    --border:  rgba(255,255,255,.18);
    --border2: rgba(255,255,255,.10);
    --ink:     #ffffff;
    --ink2:    rgba(255,255,255,.90);
    --muted:   rgba(255,255,255,.55);
    --muted2:  rgba(255,255,255,.38);
    --gold:    #d4b896;   /* warm accent, readable on grey */
    --gold-l:  #e8cfa8;
    --sage:    #9ec4aa;
    --sky:     #9ab4c8;
    --rose:    #d4a0a0;
    --lav:     #b4a8c8;
    --radius:  14px;
    --nav-h:   72px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%; overflow: hidden;
    font-family: 'Meiryo', 'メイリオ', 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN W3', sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 50px 20px 14px;
    position: fixed; top:0; left:0; right:0; z-index:20;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .month-badge {
    border: 1px solid var(--border);
    color: var(--ink2);
    background: transparent;
    font-size: 11px; padding: 6px 14px; border-radius: 20px;
    font-weight: 300; cursor: pointer; user-select: none;
    -webkit-tap-highlight-color: transparent;
    display: flex; align-items: center; gap: 6px;
    letter-spacing: .04em; transition: background .2s;
  }
  .month-badge:active { background: rgba(255,255,255,.08); }
  .badge-arrow { font-size: 9px; color: var(--muted); }

  /* ── Month overlay ── */
  .month-overlay {
    display:none; position:fixed; inset:0; z-index:40;
    background: rgba(30,28,25,.6); backdrop-filter:blur(6px);
    align-items:flex-start; justify-content:flex-end; padding:100px 18px 0;
  }
  .month-overlay.open { display:flex; }
  .month-picker {
    background: var(--card2); border:1px solid var(--border);
    border-radius: var(--radius); overflow:hidden; min-width:175px;
    box-shadow: 0 16px 48px rgba(0,0,0,.35);
    animation: dropIn .18s ease;
  }
  @keyframes dropIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:none} }
  .month-picker-title {
    font-size: 10px; color: var(--muted); letter-spacing: .14em;
    padding: 12px 16px 9px; border-bottom: 1px solid var(--border);
    text-transform: uppercase;
  }
  .month-option {
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px; cursor:pointer; transition:background .15s;
    border-bottom:1px solid var(--border2);
    -webkit-tap-highlight-color:transparent;
  }
  .month-option:last-child { border-bottom:none; }
  .month-option:active { background: rgba(255,255,255,.08); }
  .month-option.selected { background: rgba(212,184,150,.12); }
  .month-option-label { font-size:14px; font-weight:400; color:var(--ink); }
  .month-option-sub   { font-size:11px; color:var(--muted); margin-top:2px; }
  .month-option.selected .month-option-label { color:var(--gold); }
  .month-check { color:var(--gold); font-size:13px; opacity:0; }
  .month-option.selected .month-check { opacity:1; }

  /* ── Viewport & slides ── */
  .viewport { position:fixed; left:0; right:0; bottom:var(--nav-h); overflow:hidden; }
  .slides-track { display:flex; width:300%; height:100%; will-change:transform; }
  .slide {
    width:calc(100% / 3); height:100%;
    overflow-y:auto; overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    padding: 22px 16px calc(22px + env(safe-area-inset-bottom));
  }

  /* ── Bottom nav ── */
  .bottom-nav {
    position:fixed; bottom:0; left:0; right:0;
    height:var(--nav-h); background:var(--bg2);
    border-top:1px solid var(--border);
    display:flex; align-items:center;
    padding:0 10px; padding-bottom:env(safe-area-inset-bottom);
    z-index:20; gap:6px;
  }
  .nav-item {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:5px; cursor:pointer; -webkit-tap-highlight-color:transparent;
    height:54px; border-radius:12px;
    transition:background .25s, border-color .25s;
    border:1px solid transparent;
  }
  .nav-item:active { opacity:.7; }
  .nav-item.active { background:rgba(212,184,150,.14); border-color:var(--gold); }
  .nav-icon { display:flex; align-items:center; justify-content:center; color:var(--muted); transition:transform .3s cubic-bezier(.34,1.56,.64,1), color .25s; line-height:1; }
  .nav-label { font-size:10px; font-weight:400; color:var(--muted); transition:color .25s; letter-spacing:.08em; }
  .nav-item.active .nav-label { color:var(--gold); font-weight:500; }
  .nav-item.active .nav-icon { transform:scale(1.1); color:var(--gold); }

  /* ── Section label ── */
  .section-label {
    font-size: 11px; letter-spacing: .16em; color:var(--muted);
    margin-bottom:14px; margin-top:28px;
    text-transform:uppercase;
  }
  .section-label:first-child { margin-top:0; }

  /* ── KPI Cards ── */
  .kpi-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
  .kpi-card {
    background: var(--card); border:1px solid var(--border);
    border-radius:var(--radius); padding:16px;
    position:relative; overflow:hidden;
    cursor:pointer; -webkit-tap-highlight-color:transparent; user-select:none;
    transition:border-color .2s, background .2s;
  }
  .kpi-card:active { background:var(--card2); }
  .kpi-card.expanded { border-color:var(--gold); }
  .kpi-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; }
  .kpi-card.c-gold::before { background:var(--gold); }
  .kpi-card.c-sage::before { background:var(--sage); }
  .kpi-card.c-sky::before  { background:var(--sky); }
  .kpi-card.c-rose::before { background:var(--rose); }

  .kpi-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .kpi-label {
    font-size:10px; color:var(--muted); letter-spacing:.12em; text-transform:uppercase;
  }
  .kpi-arrow { font-size:11px; color:var(--muted2); transition:transform .2s; }
  .kpi-card.expanded .kpi-arrow { transform:rotate(180deg); color:var(--gold); }
  .kpi-value { font-size:17px; font-weight:400; color:var(--ink); line-height:1.2; word-break:break-all; }
  .kpi-badge { display:inline-block; font-size:10px; padding:3px 9px; border-radius:20px; margin-top:7px; font-weight:400; letter-spacing:.04em; }
  .kpi-badge.up   { background:rgba(158,196,170,.18); color:var(--sage); }
  .kpi-badge.down { background:rgba(212,160,160,.18); color:var(--rose); }
  .kpi-detail { display:none; margin-top:12px; padding-top:12px; border-top:1px solid var(--border2); }
  .kpi-card.expanded .kpi-detail { display:block; }
  .kpi-detail-row { display:flex; justify-content:space-between; align-items:center; font-size:11px; margin-bottom:8px; }
  .kpi-detail-row:last-child { margin-bottom:0; }
  .kpi-detail-name { color:var(--muted); letter-spacing:.04em; }
  .kpi-detail-val  { font-weight:400; color:var(--ink2); }
  .kpi-mini-bar { width:100%; height:2px; background:rgba(255,255,255,.12); border-radius:2px; margin:5px 0 9px; overflow:hidden; }
  .kpi-mini-bar-fill { height:100%; border-radius:2px; }

  /* ── Donut ── */
  .donut-wrap { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
  .pie-title { font-size:13px; font-weight:400; letter-spacing:.06em; margin-bottom:18px; color:var(--ink2); }
  .pie-wrap  { display:flex; align-items:center; gap:20px; }
  svg.pie    { flex-shrink:0; }
  .legend { flex:1; display:flex; flex-direction:column; gap:12px; }
  .legend-item { display:flex; align-items:center; gap:9px; }
  .legend-dot  { width:8px; height:8px; border-radius:2px; flex-shrink:0; }
  .legend-name { font-size:11px; color:var(--muted); flex:1; letter-spacing:.04em; }
  .legend-pct  { font-size:14px; font-weight:400; color:var(--ink); }

  /* ── Staff cards ── */
  .staff-list { display:flex; flex-direction:column; gap:10px; }
  .staff-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:var(--radius); padding:16px;
    cursor:pointer; -webkit-tap-highlight-color:transparent;
    transition:border-color .2s;
  }
  .staff-card.expanded { border-color:var(--gold); }
  .staff-header { display:flex; align-items:center; gap:13px; }
  .avatar {
    width:42px; height:42px; border-radius:10px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-family:'Cormorant Garamond',serif; font-size:13px;
    font-weight:400; letter-spacing:.02em;
    border:1px solid var(--border);
  }
  .staff-info { flex:1; min-width:0; }
  .staff-name { font-size:14px; font-weight:400; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:.04em; }
  .staff-role { font-size:11px; color:var(--muted); margin-top:3px; letter-spacing:.08em; }
  .staff-sales { text-align:right; flex-shrink:0; }
  .staff-sales-val { font-size:13px; font-weight:400; color:var(--gold); }
  .staff-sales-cnt { font-size:10px; color:var(--muted); margin-top:3px; }
  .breakdown { display:none; margin-top:14px; padding-top:14px; border-top:1px solid var(--border2); }
  .staff-card.expanded .breakdown { display:block; }
  .bar-row { display:flex; align-items:center; gap:8px; margin-bottom:9px; }
  .bar-label { font-size:10px; color:var(--muted); width:60px; flex-shrink:0; letter-spacing:.04em; }
  .bar-track { flex:1; height:4px; background:rgba(255,255,255,.12); border-radius:3px; overflow:hidden; }
  .bar-fill  { height:100%; border-radius:3px; }
  .bar-val   { font-size:10px; color:var(--ink2); width:34px; text-align:right; flex-shrink:0; }
  .rank { width:19px; height:19px; border-radius:5px; display:inline-flex; align-items:center; justify-content:center; font-size:9px; font-weight:500; margin-left:5px; vertical-align:middle; }
  .rank-1     { background:rgba(212,184,150,.25); color:var(--gold); }
  .rank-2     { background:rgba(255,255,255,.12); color:var(--muted); }
  .rank-3     { background:rgba(255,255,255,.08); color:var(--muted2); }
  .rank-other { background:transparent; color:var(--muted2); }
  .chevron { font-size:12px; color:var(--muted2); transition:transform .2s; flex-shrink:0; }
  .staff-card.expanded .chevron { transform:rotate(180deg); color:var(--gold); }

  /* ── Service grid ── */
  .service-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .service-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:var(--radius); padding:18px 14px; text-align:center;
  }
  .service-icon { display:flex; align-items:center; justify-content:center; margin-bottom:10px; color:rgba(255,255,255,.65); }
  .service-name {
    font-size:11px; color:var(--muted); letter-spacing:.10em; margin-bottom:6px;
  }
  .service-pct {
    font-size:28px; font-weight:300; color:var(--ink); line-height:1;
  }
  .service-pct span { font-size:15px; }
  .service-cnt { font-size:10px; color:var(--muted); margin-top:9px; line-height:2; letter-spacing:.04em; }

  /* ── Staff × Menu ── */
  .sbdown-wrap { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:18px; }
  .divider { height:1px; background:var(--border2); margin:6px 0 2px; }

  @media(max-width:360px){ .kpi-value{font-size:15px;} .service-pct{font-size:26px;} }
</style>
</head>
<body>

<div class="month-overlay" id="monthOverlay" onclick="closeMonthPicker(event)">
  <div class="month-picker" id="monthPicker">
    <div class="month-picker-title">Month</div>
  </div>
</div>

<div class="header">
  <div class="header-top">
    <div>
      <div style="font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-weight:300;font-size:22px;color:#fff;letter-spacing:0.06em;line-height:1;">T ring 天王町</div>
      <div style="font-size:9px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;margin-top:4px;">Sales Report</div>
    </div>
    <div class="month-badge" id="monthBadge" onclick="openMonthPicker()">
      <span id="monthBadgeText">2025年3月</span>
      <span class="badge-arrow">▾</span>
    </div>
  </div>
</div>

<div class="viewport" id="viewport">
  <div class="slides-track" id="slidesTrack">

    <!-- 全体 -->
    <div class="slide" id="slide-0">
      <div class="section-label">Summary</div>
      <div class="kpi-row">
        <div class="kpi-card c-gold" onclick="toggleKpi(this)">
          <div class="kpi-top"><div class="kpi-label">総売上</div><div class="kpi-arrow">▾</div></div>
          <div class="kpi-value" id="kpi-sales"></div>
          <div class="kpi-badge" id="kpi-sales-badge"></div>
          <div class="kpi-detail" id="kpi-sales-detail"></div>
        </div>
        <div class="kpi-card c-sage" onclick="toggleKpi(this)">
          <div class="kpi-top"><div class="kpi-label">来客数</div><div class="kpi-arrow">▾</div></div>
          <div class="kpi-value" id="kpi-clients"></div>
          <div class="kpi-badge" id="kpi-clients-badge"></div>
          <div class="kpi-detail" id="kpi-clients-detail"></div>
        </div>
      </div>
      <div class="kpi-row">
        <div class="kpi-card c-sky" onclick="toggleKpi(this)">
          <div class="kpi-top"><div class="kpi-label">客単価</div><div class="kpi-arrow">▾</div></div>
          <div class="kpi-value" id="kpi-avg"></div>
          <div class="kpi-badge" id="kpi-avg-badge"></div>
          <div class="kpi-detail" id="kpi-avg-detail"></div>
        </div>
        <div class="kpi-card c-rose" onclick="toggleKpi(this)">
          <div class="kpi-top"><div class="kpi-label">新規顧客</div><div class="kpi-arrow">▾</div></div>
          <div class="kpi-value" id="kpi-new"></div>
          <div class="kpi-badge" id="kpi-new-badge"></div>
          <div class="kpi-detail" id="kpi-new-detail"></div>
        </div>
      </div>
      <div class="section-label">Menu Ratio</div>
      <div class="donut-wrap">
        <div class="pie-title">メニュー構成比</div>
        <div class="pie-wrap">
          <svg class="pie" width="110" height="110" viewBox="0 0 110 110" id="donutSvg"></svg>
          <div class="legend" id="donutLegend"></div>
        </div>
      </div>
    </div>

    <!-- スタッフ -->
    <div class="slide" id="slide-1">
      <div class="section-label">Staff</div>
      <div class="staff-list" id="staffList"></div>
    </div>

    <!-- メニュー -->
    <div class="slide" id="slide-2">
      <div class="section-label">Menu</div>
      <div class="service-grid" id="serviceGrid"></div>
      <div class="section-label" style="margin-top:24px">Staff × Menu</div>
      <div class="sbdown-wrap">
        <div id="staffMenuBreakdown" style="display:flex;flex-direction:column;gap:16px;"></div>
      </div>
    </div>

  </div>
</div>

<nav class="bottom-nav">
  <div class="nav-item active" id="nav-0" onclick="navTap(event,0)">
    <div class="nav-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="8" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/>
        <rect x="14" y="11" width="7" height="10" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>

    </div>
    <div class="nav-label">全体</div>
  </div>
  <div class="nav-item" id="nav-1" onclick="navTap(event,1)">
    <div class="nav-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="7" r="3"/><circle cx="17" cy="8" r="2.5"/>
        <path d="M2 20c0-3.3 3.1-6 7-6s7 2.7 7 6"/><path d="M22 20c0-2.5-2.2-4.5-5-4.5"/>
      </svg>
    </div>
    <div class="nav-label">スタッフ</div>
  </div>
  <div class="nav-item" id="nav-2" onclick="navTap(event,2)">
    <div class="nav-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 3c0 0 1 1 1 4s-2 5-2 8c0 2.2 1.8 4 4 4s4-1.8 4-4c0-3-2-5-2-8s1-4 1-4"/>
        <path d="M6 3h6"/><line x1="6" y1="9" x2="12" y2="9"/>
        <path d="M19 3l-5 18"/>
      </svg>
    </div>
    <div class="nav-label">メニュー</div>
  </div>
</nav>

<script>
// ══ カラー ══
const MC  = { cut:'#9ab4c8', color:'#d4b896', perm:'#d4a0a0', tr:'#9ec4aa', spa:'#b4a8c8' };
const ML  = { cut:'カット', color:'カラー', perm:'縮毛矯正', tr:'トリートメント', spa:'ヘッドスパ' };
const MI = {
  // ハサミ（カット）
  cut:  `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>`,

  color:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.48 2 2 6.48 2 12c0 5.52 4.48 9 10 9 1.1 0 2-.9 2-2 0-.53-.21-1.01-.55-1.36-.33-.34-.54-.81-.54-1.32 0-1.1.9-2 2-2h2.34C19.5 14.32 22 11.4 22 8c0-3.31-4.48-6-10-6z"/><circle cx="6.5" cy="11.5" r="1.5" fill="currentColor" stroke="none"/><circle cx="9.5" cy="7.5" r="1.5" fill="currentColor" stroke="none"/><circle cx="14.5" cy="7.5" r="1.5" fill="currentColor" stroke="none"/><circle cx="17.5" cy="11.5" r="1.5" fill="currentColor" stroke="none"/></svg>`,

  spa:  `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V8a2 2 0 0 0-4 0v3"/><path d="M14 10V6a2 2 0 0 0-4 0v4"/><path d="M10 10V8a2 2 0 0 0-4 0v6c0 3.31 2.69 6 6 6s6-2.69 6-6v-3a2 2 0 0 0-4 0v3"/></svg>`,

// ══ データ ══
const MONTHS = [
  {key:'2025-01',label:'2025年1月'},
  {key:'2025-02',label:'2025年2月'},
  {key:'2025-03',label:'2025年3月'},
];

const DATA = {
  '2025-01': {
    sales:1980000, salesPrev:1850000, salesTarget:2000000,
    clients:248, clientsPrev:231, repeaters:204, newClients:44,
    avgPrice:7984, avgPrev:8009, maxPrice:22000, minPrice:3100,
    newIg:19, newRef:14, newOther:11,
    menu:{cut:22,color:28,perm:24,tr:16,spa:10},
    menuCounts:{cut:55,color:69,perm:60,tr:40,spa:24},

// ══ スライド ══
let currentIdx=0;
const track=document.getElementById('slidesTrack');
function goTo(idx,animate=true,ox,oy){
  track.style.transition=animate?'transform .32s cubic-bezier(.4,0,.2,1)':'none';
  currentIdx=idx; track.style.transform=`translateX(${-idx*(100/3)}%)`; updateNav();
  document.querySelectorAll('.kpi-card.expanded').forEach(c=>c.classList.remove('expanded'));
}
function updateNav(){ document.querySelectorAll('.nav-item').forEach((n,i)=>n.classList.toggle('active',i===currentIdx)); }
function navTap(e,idx){ goTo(idx,true); }

// スワイプ
let txStart=0,tyStart=0,txDelta=0,swState='idle';
const vp=document.getElementById('viewport');
vp.addEventListener('touchstart',e=>{
  const m=new WebKitCSSMatrix(getComputedStyle(track).transform);
  track.style.transition='none'; track.style.transform=`translateX(${m.m41}px)`;
  txStart=e.touches[0].clientX; tyStart=e.touches[0].clientY; txDelta=0; swState='idle';
},{passive:true});
vp.addEventListener('touchmove',e=>{
  const dx=e.touches[0].clientX-txStart,dy=e.touches[0].clientY-tyStart;
  if(swState==='idle'){if(Math.abs(dx)<6&&Math.abs(dy)<6)return;swState=Math.abs(dx)>=Math.abs(dy)?'h':'v';}
  if(swState==='v')return; e.preventDefault(); txDelta=dx;
  let off=dx;
  if((currentIdx===0&&dx>0)||(currentIdx===2&&dx<0))off=dx*.25;
  track.style.transform=`translateX(calc(${-currentIdx*(100/3)}% + ${off}px))`;
},{passive:false});
function finishSwipe(){
  if(swState!=='h'){swState='idle';return;} swState='idle';
  const th=window.innerWidth*.20; let next=currentIdx;
  if(txDelta<-th&&currentIdx<2)next=currentIdx+1;
  else if(txDelta>th&&currentIdx>0)next=currentIdx-1;
  track.style.transition='transform .32s cubic-bezier(.4,0,.2,1)';
  currentIdx=next; track.style.transform=`translateX(${-next*(100/3)}%)`; updateNav();
  document.querySelectorAll('.kpi-card.expanded').forEach(c=>c.classList.remove('expanded'));
}
vp.addEventListener('touchend',finishSwipe);
vp.addEventListener('touchcancel',finishSwipe);

// ══ 月ピッカー ══
let currentMonth='2025-03';
function buildMonthPicker(){
  const p=document.getElementById('monthPicker');
  p.querySelectorAll('.month-option').forEach(e=>e.remove());
  [...MONTHS].reverse().forEach(m=>{
    const d=DATA[m.key],opt=document.createElement('div');
    opt.className='month-option'+(m.key===currentMonth?' selected':'');
    opt.innerHTML=`<div><div class="month-option-label">${m.label}</div><div class="month-option-sub">${fmtYen(d.sales)}</div></div><div class="month-check">✓</div>`;
    opt.addEventListener('click',()=>selectMonth(m.key)); p.appendChild(opt);
  });
}
function openMonthPicker(){buildMonthPicker();document.getElementById('monthOverlay').classList.add('open');}
function closeMonthPicker(e){if(e.target===document.getElementById('monthOverlay'))document.getElementById('monthOverlay').classList.remove('open');}
function selectMonth(key){
  currentMonth=key; document.getElementById('monthOverlay').classList.remove('open');
  document.getElementById('monthBadgeText').textContent=MONTHS.find(m=>m.key===key).label;
  renderAll();
}

// ══ レンダリング ══
function fmtYen(n){return n.toLocaleString('ja-JP')+'円';}
function setBadge(id,cur,prev){
  const el=document.getElementById(id);if(!el)return;
  const diff=((cur-prev)/prev*100).toFixed(1),up=cur>=prev;
  el.className='kpi-badge '+(up?'up':'down');
  el.textContent=(up?'▲ ':'▼ ')+Math.abs(diff)+'%';
}
function prevKey(){const i=MONTHS.findIndex(m=>m.key===currentMonth);return i>0?MONTHS[i-1].key:null;}

function renderAll(){
  document.querySelectorAll('.kpi-card.expanded').forEach(c=>c.classList.remove('expanded'));
  const d=DATA[currentMonth];

  document.getElementById('kpi-sales').textContent=fmtYen(d.sales);
  setBadge('kpi-sales-badge',d.sales,d.salesPrev);
  const sp=Math.min(100,Math.round(d.sales/d.salesTarget*100));
  document.getElementById('kpi-sales-detail').innerHTML=`
    <div class="kpi-detail-row"><span class="kpi-detail-name">先月</span><span class="kpi-detail-val">${fmtYen(d.salesPrev)}</span></div>
    <div class="kpi-detail-row"><span class="kpi-detail-name">目標</span><span class="kpi-detail-val">${fmtYen(d.salesTarget)}</span></div>
    <div class="kpi-mini-bar"><div class="kpi-mini-bar-fill" style="width:${sp}%;background:var(--gold)"></div></div>
    <div class="kpi-detail-row"><span class="kpi-detail-name">達成率</span><span class="kpi-detail-val" style="color:${d.sales>=d.salesTarget?'var(--sage)':'var(--rose)'}">${Math.round(d.sales/d.salesTarget*100)}%</span></div>`;

  document.getElementById('kpi-clients').textContent=d.clients+'名';
  setBadge('kpi-clients-badge',d.clients,d.clientsPrev);
  document.getElementById('kpi-clients-detail').innerHTML=`
    <div class="kpi-detail-row"><span class="kpi-detail-name">先月</span><span class="kpi-detail-val">${d.clientsPrev}名</span></div>
    <div class="kpi-detail-row"><span class="kpi-detail-name">リピーター</span><span class="kpi-detail-val">${d.repeaters}名</span></div>
    <div class="kpi-detail-row"><span class="kpi-detail-name">新規</span><span class="kpi-detail-val">${d.newClients}名</span></div>
    <div class="kpi-mini-bar"><div class="kpi-mini-bar-fill" style="width:${Math.round(d.repeaters/d.clients*100)}%;background:var(--sage)"></div></div>
    <div class="kpi-detail-row"><span class="kpi-detail-name">リピート率</span><span class="kpi-detail-val" style="color:var(--sage)">${(d.repeaters/d.clients*100).toFixed(1)}%</span></div>`;

  document.getElementById('kpi-avg').textContent=fmtYen(d.avgPrice);
  setBadge('kpi-avg-badge',d.avgPrice,d.avgPrev);
  document.getElementById('kpi-avg-detail').innerHTML=`
    <div class="kpi-detail-row"><span class="kpi-detail-name">先月</span><span class="kpi-detail-val">${fmtYen(d.avgPrev)}</span></div>
    <div class="kpi-detail-row"><span class="kpi-detail-name">最高単価</span><span class="kpi-detail-val">${fmtYen(d.maxPrice)}</span></div>
    <div class="kpi-detail-row"><span class="kpi-detail-name">最低単価</span><span class="kpi-detail-val">${fmtYen(d.minPrice)}</span></div>`;

  document.getElementById('kpi-new').textContent=d.newClients+'名';
  const pk=prevKey(); setBadge('kpi-new-badge',d.newClients,pk?DATA[pk].newClients:d.newClients);
  document.getElementById('kpi-new-detail').innerHTML=`
    <div class="kpi-detail-row"><span class="kpi-detail-name">Instagram</span><span class="kpi-detail-val">${d.newIg}名</span></div>
    <div class="kpi-detail-row"><span class="kpi-detail-name">紹介</span><span class="kpi-detail-val">${d.newRef}名</span></div>
    <div class="kpi-detail-row"><span class="kpi-detail-name">その他</span><span class="kpi-detail-val">${d.newOther}名</span></div>`;

  renderDonut(d); renderStaff(d); renderService(d);
}

function renderDonut(d){
  const circ=2*Math.PI*38;
  const segs=[{k:'color'},{k:'perm'},{k:'cut'},{k:'tr'},{k:'spa'}];
  let off=0;
  const circles=segs.map(s=>{
    const pct=d.menu[s.k],dash=(pct/100*circ).toFixed(2),gap=(circ-dash).toFixed(2);
    const c=`<circle cx="55" cy="55" r="38" fill="none" stroke="${MC[s.k]}" stroke-width="18"
      stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-off}" transform="rotate(-90 55 55)" opacity=".9"/>`;
    off+=parseFloat(dash); return c;
  }).join('');
  const total=Object.values(d.menuCounts).reduce((a,b)=>a+b,0);
  document.getElementById('donutSvg').innerHTML=circles+`
    <circle cx="55" cy="55" r="29" fill="#7a7570"/>
    <text x="55" y="52" text-anchor="middle" fill="white" font-size="11" font-family="Noto Sans JP" font-weight="300">${total}</text>
    <text x="55" y="63" text-anchor="middle" fill="rgba(255,255,255,.55)" font-size="8.5" font-family="Noto Sans JP">件</text>`;
  document.getElementById('donutLegend').innerHTML=segs.map(s=>`
    <div class="legend-item">
      <div class="legend-dot" style="background:${MC[s.k]}"></div>
      <div class="legend-name">${ML[s.k]}</div>
      <div class="legend-pct">${d.menu[s.k]}%</div>
    </div>`).join('');
}

function renderStaff(d){
  const list=document.getElementById('staffList'); list.innerHTML='';
  const sorted=[...d.staff].sort((a,b)=>b.sales-a.sales);
  sorted.forEach((s,i)=>{
    const rank=i+1,rc=rank===1?'rank-1':rank===2?'rank-2':rank===3?'rank-3':'rank-other';
    const card=document.createElement('div'); card.className='staff-card';
    const bars=Object.keys(ML).map(k=>`
      <div class="bar-row">
        <div class="bar-label">${ML[k]}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${s.menu[k]}%;background:${MC[k]}"></div></div>
        <div class="bar-val">${s.menu[k]}%</div>
      </div>`).join('');
    card.innerHTML=`
      <div class="staff-header" onclick="toggleCard(this.closest('.staff-card'))">
        <div class="avatar" style="background:${s.bg};color:${s.tc}">${s.ini}</div>
        <div class="staff-info">
          <div class="staff-name">${s.name} <span class="rank ${rc}">${rank}</span></div>
          <div class="staff-role">${s.role}</div>
        </div>
        <div class="staff-sales">
          <div class="staff-sales-val">${fmtYen(s.sales)}</div>
          <div class="staff-sales-cnt">${s.clients}名</div>
        </div>
        <div class="chevron">▾</div>
      </div>
      <div class="breakdown">${bars}</div>`;
    list.appendChild(card);
  });

  const sb=document.getElementById('staffMenuBreakdown'); sb.innerHTML='';
  sorted.forEach((s,i)=>{
    const row=document.createElement('div'); row.style.cssText='display:flex;flex-direction:column;gap:6px;';
    row.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <span style="font-size:12px;color:rgba(255,255,255,.9);letter-spacing:.04em">${s.name}</span>
        <span style="font-size:10px;color:rgba(255,255,255,.45)">${fmtYen(s.sales)}</span>
      </div>
      <div style="display:flex;gap:2px;height:5px;border-radius:4px;overflow:hidden">
        ${Object.keys(ML).map(k=>`<div style="width:${s.menu[k]}%;background:${MC[k]};opacity:.85"></div>`).join('')}
      </div>
      <div style="display:flex;gap:10px;font-size:9px;flex-wrap:wrap">
        ${Object.keys(ML).map(k=>`<span style="color:${MC[k]};opacity:.9">${ML[k]} ${s.menu[k]}%</span>`).join('')}
      </div>
      ${i<sorted.length-1?'<div class="divider"></div>':''}`;
    sb.appendChild(row);
  });
}

function renderService(d){
  document.getElementById('serviceGrid').innerHTML=Object.keys(ML).map(k=>`
    <div class="service-card" style="border-color:rgba(255,255,255,.14)">
      <div class="service-icon">${MI[k]}</div>
      <div class="service-name">${ML[k]}</div>
      <div class="service-pct" style="color:${MC[k]}">${d.menu[k]}<span>%</span></div>
      <div class="service-cnt">${d.menuCounts[k]}件<br>${fmtYen(d.menuSales[k])}</div>
    </div>`).join('');
}

function toggleCard(c){c.classList.toggle('expanded');}
function toggleKpi(c){c.classList.toggle('expanded');}
